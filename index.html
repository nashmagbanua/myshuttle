<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee - Kaizen Shuttle Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #0046ad; --accent: #059669; --dark: #1e293b; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f3f4f6; overflow: hidden; height: 100vh; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; }

        #onboard-banner {
            display: none; position: absolute; top: 0; left: 0; width: 100%; 
            background: var(--accent); color: white; padding: 12px; text-align: center;
            font-weight: bold; font-size: 0.9rem; z-index: 4000; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .status-overlay {
            position: absolute; top: 60px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 6px solid var(--primary);
            min-width: 180px;
        }

        /* MAP SETTINGS / BURGER MENU */
        .map-settings { position: absolute; top: 65px; right: 15px; z-index: 2000; }
        .burger-btn { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.2rem; cursor: pointer; }
        .menu-content { 
            display: none; position: absolute; right: 0; top: 55px; background: white; 
            padding: 12px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 180px; 
        }
        .menu-content.show { display: block; }

        .fab-container { position: absolute; bottom: 30px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        .fab { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 1.6rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-reg { background: var(--primary); }
        .btn-scan { background: var(--dark); }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        select, input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 1rem; box-sizing: border-box; }
        
        .stop-label { background: white; border: 2px solid var(--primary); padding: 4px 8px; font-size: 12px; font-weight: bold; color: var(--primary); border-radius: 6px; }
    </style>
</head>
<body>

<div id="onboard-banner">✅ VERIFIED ON-BOARD | HAVE A SAFE RIDE</div>

<div class="status-overlay">
    <div id="trip-direction" style="font-size: 0.7rem; font-weight: 800; color: #94a3b8;">WAITING...</div>
    <div id="current-stop-name" style="font-weight: 900; font-size: 1.2rem; color: var(--dark); margin: 5px 0;">No Active Trip</div>
    <div id="status-badge" style="font-size: 0.7rem; font-weight: bold; display: flex; align-items: center;">
        <span id="pulse-dot" style="height: 8px; width: 8px; border-radius: 50%; background: #cbd5e1; margin-right: 6px;"></span>
        <span id="status-text">OFFLINE</span>
    </div>
</div>

<div class="map-settings">
    <button class="burger-btn" onclick="toggleMenu()">☰</button>
    <div id="settings-menu" class="menu-content">
        <div style="font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; color: #888;">MAP OPTIONS</div>
        <label style="display:block; font-size:0.85rem; margin-bottom:10px; cursor:pointer;">
            <input type="radio" name="view" value="smart" checked onchange="updateView()"> Bus + Next Stop
        </label>
        <label style="display:block; font-size:0.85rem; cursor:pointer;">
            <input type="radio" name="view" value="shuttle" onchange="updateView()"> Bus Only
        </label>
    </div>
</div>

<div id="map"></div>

<div class="fab-container">
    <button id="scan-fab" class="fab btn-scan" onclick="openScanner()">📷</button>
    <button id="reg-fab" class="fab btn-reg" onclick="openModal()">+</button>
</div>

<div id="arrivalModal" class="modal">
    <div class="modal-content" style="border-top: 10px solid var(--success);">
        <h1 style="font-size: 3rem; margin: 0;">📍</h1>
        <h2 style="color: var(--accent); margin-top: 10px;">Arrived at Destination!</h2>
        <p id="arrival-msg">You have reached your drop-off point.</p>
        <button onclick="confirmArrival()" style="width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">CONFIRM & LOG OUT</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content" style="text-align: left;">
        <h2 style="margin:0 0 15px 0; color: var(--primary);">Join Trip</h2>
        <input type="number" id="emp-id" placeholder="Employee ID">
        <label style="font-size:0.7rem; font-weight:bold;">PICKUP</label>
        <select id="pickup-node"></select>
        <label style="font-size:0.7rem; font-weight:bold;">DROP-OFF</label>
        <select id="dropoff-node"></select>
        <button onclick="registerRide()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:900; margin-top:10px;">CONFIRM</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="scanModal" class="modal">
    <div class="modal-content" style="background:transparent; color:white;">
        <div id="reader"></div>
        <button onclick="closeScanner()" style="width:100%; padding:15px; background:white; color:var(--danger); border:none; border-radius:12px; font-weight:900; margin-top:10px;">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const routeLists = {
        papasok: ["Calamba Old Market", "Parian Shuttle Station", "Mamatid", "Banlic / Waltermart", "San Isidro", "Pulo", "Banay-banay", "Katapatan", "Nestle Plant", "Niugan / St. Francis", "Sala Rotonda", "Sala Overpass", "Tanduay Gate", "ABI Gasoline Station", "Glass Plant", "Package World", "Plant 2", "Nutribev"],
        palabas_nutribev: ["Nutribev", "Plant 2", "Package World", "Glass Plant", "ABI Gasoline Station", "Tanduay Gate", "Sala Overpass", "Sala Rotonda", "Niugan / St. Francis", "Nestle Plant", "Katapatan", "Banay-banay", "Pulo", "San Isidro", "Banlic / Waltermart", "Mamatid", "Parian Shuttle Station", "Calamba Old Market"],
        palabas_abi: ["Transpo / ABI", "ABI Gasoline Station", "Tanduay Gate", "Sala Overpass", "Sala Rotonda", "Niugan / St. Francis", "Nestle Plant", "Katapatan", "Banay-banay", "Pulo", "San Isidro", "Banlic / Waltermart", "Mamatid", "Parian Shuttle Station", "Calamba Old Market"]
    };

    const allStops = { /* ... (Same coordinate data as before) ... */
        "Calamba Old Market": { lat: 14.2056, lng: 121.1535 }, "Parian Shuttle Station": { lat: 14.2172, lng: 121.1436 }, "Mamatid": { lat: 14.2296, lng: 121.1380 }, "Banlic / Waltermart": { lat: 14.2324, lng: 121.1356 }, "San Isidro": { lat: 14.2384, lng: 121.1331 }, "Pulo": { lat: 14.2439, lng: 121.1309 }, "Banay-banay": { lat: 14.2509, lng: 121.1289 }, "Katapatan": { lat: 14.2561, lng: 121.1282 }, "Nestle Plant": { lat: 14.2603, lng: 121.1277 }, "Niugan / St. Francis": { lat: 14.2638, lng: 121.1273 }, "Sala Rotonda": { lat: 14.2679, lng: 121.1265 }, "Sala Overpass": { lat: 14.2710, lng: 121.1231 }, "Tanduay Gate": { lat: 14.2718, lng: 121.1221 }, "ABI Gasoline Station": { lat: 14.2693, lng: 121.1193 }, "Glass Plant": { lat: 14.2644, lng: 121.1183 }, "Package World": { lat: 14.2618, lng: 121.1187 }, "Plant 2": { lat: 14.2607, lng: 121.1179 }, "Nutribev": { lat: 14.2580, lng: 121.1206 }, "Transpo / ABI": { lat: 14.2687, lng: 121.1203 }
    };

    const map = L.map('map', { zoomControl: false }).setView([14.24, 121.13], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png', iconSize: [45, 45], iconAnchor: [22, 22] });
    let busMarker = L.marker([14.2056, 121.1535], { icon: busIcon }).addTo(map);
    
    let stopMarkers = [];
    let lastActiveRouteKey = "";
    let currentViewMode = "smart";
    let arrivalAlertShown = false;

    function toggleMenu() { document.getElementById('settings-menu').classList.toggle('show'); }
    function updateView() { currentViewMode = document.querySelector('input[name="view"]:checked').value; sync(); }

    function sync() {
        const state = JSON.parse(localStorage.getItem('shuttle_state') || '{}');
        const myRide = JSON.parse(localStorage.getItem('my_ride_status') || '{}');

        if (!state.activeRouteKey) {
            document.getElementById('current-stop-name').innerText = "No Active Trip";
            return;
        }

        if (state.activeRouteKey !== lastActiveRouteKey) {
            updateDropdownOptions(state.activeRouteKey);
            lastActiveRouteKey = state.activeRouteKey;
        }

        const route = routeLists[state.activeRouteKey];
        const currentStop = route[state.currentIndex];
        const coords = allStops[currentStop];

        busMarker.setLatLng([coords.lat, coords.lng]);
        map.panTo([coords.lat, coords.lng]);

        document.getElementById('current-stop-name').innerText = currentStop;
        document.getElementById('trip-direction').innerText = state.activeRouteKey.toUpperCase().replace('_', ' ');
        document.getElementById('status-text').innerText = state.isMoving ? "MOVING" : "AT STOP";
        document.getElementById('pulse-dot').style.background = state.isMoving ? "#0046ad" : "#059669";

        // ARRIVAL LOGIC (Pogi Points)
        if (myRide.boarded && !state.isMoving && currentStop === myRide.dropoff && !arrivalAlertShown) {
            document.getElementById('arrival-msg').innerText = `Bus has arrived at ${currentStop}.`;
            document.getElementById('arrivalModal').style.display = 'flex';
            arrivalAlertShown = true;
        }

        if (myRide.boarded) {
            document.getElementById('onboard-banner').style.display = 'block';
            document.getElementById('scan-fab').style.display = 'none';
            document.getElementById('reg-fab').style.display = 'none';
        }

        renderMarkers(currentStop, route[state.currentIndex + 1]);
    }

    function renderMarkers(active, next) {
        stopMarkers.forEach(m => map.removeLayer(m));
        stopMarkers = [];
        Object.entries(allStops).forEach(([name, pos]) => {
            let show = (currentViewMode === "smart" && (name === active || name === next)) || (currentViewMode === "shuttle" && name === active);
            if (show) {
                const isNext = name === next;
                const m = L.circleMarker([pos.lat, pos.lng], { radius: isNext ? 6 : 9, color: isNext ? '#64748b' : '#dc3545', fillOpacity: 1 }).addTo(map);
                if(isNext) m.bindTooltip("NEXT: " + name, { permanent: true, direction: 'top', className: 'stop-label' });
                stopMarkers.push(m);
            }
        });
    }

    function updateDropdownOptions(key) {
        const p = document.getElementById('pickup-node'), d = document.getElementById('dropoff-node');
        p.innerHTML = ""; d.innerHTML = "";
        routeLists[key].forEach(s => { p.add(new Option(s, s)); d.add(new Option(s, s)); });
        d.value = routeLists[key][routeLists[key].length - 1];
    }

    function registerRide() {
        const id = document.getElementById('emp-id').value;
        const pickup = document.getElementById('pickup-node').value;
        const dropoff = document.getElementById('dropoff-node').value;
        if(!id) return alert("Enter ID");
        
        localStorage.setItem('my_ride_status', JSON.stringify({ boarded: false, dropoff: dropoff, id: id }));
        
        let manifest = JSON.parse(localStorage.getItem('passenger_manifest') || '[]');
        manifest.push({ id, confirmed: false, from: pickup, to: dropoff });
        localStorage.setItem('passenger_manifest', JSON.stringify(manifest));
        
        alert("Registered! Drop-off set to: " + dropoff);
        closeModal();
    }

    function confirmBoarding() {
        const myRide = JSON.parse(localStorage.getItem('my_ride_status') || '{}');
        myRide.boarded = true;
        localStorage.setItem('my_ride_status', JSON.stringify(myRide));

        let state = JSON.parse(localStorage.getItem('shuttle_state') || '{}');
        state.pax = (state.pax || 0) + 1;
        localStorage.setItem('shuttle_state', JSON.stringify(state));

        alert("Confirmed On-Board!");
        closeScanner();
        sync();
    }

    function confirmArrival() {
        // Bawasan ang onboard count ni driver pagbaba
        let state = JSON.parse(localStorage.getItem('shuttle_state') || '{}');
        state.pax = Math.max(0, (state.pax || 0) - 1);
        localStorage.setItem('shuttle_state', JSON.stringify(state));

        // Clear local ride data
        localStorage.removeItem('my_ride_status');
        document.getElementById('arrivalModal').style.display = 'none';
        arrivalAlertShown = false;
        location.reload();
    }

    let scanner;
    function openScanner() {
        document.getElementById('scanModal').style.display = 'flex';
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(text === "KAIZEN_SHUTTLE_BOARD") confirmBoarding();
        });
    }
    function closeScanner() { if(scanner) scanner.stop().then(() => { document.getElementById('scanModal').style.display = 'none'; }); }
    function openModal() { document.getElementById('regModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('regModal').style.display = 'none'; }

    setInterval(sync, 2500);
    sync();
</script>
</body>
</html>
